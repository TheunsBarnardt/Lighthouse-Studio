name: Stale

on:
  schedule:
    - cron: '0 8 * * 1'

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue has been inactive for 60 days. It will be closed in 14 days unless there is activity.'
          stale-pr-message: 'This PR has been inactive for 30 days. It will be closed in 14 days unless there is activity.'
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-close: 14
          exempt-issue-labels: 'pinned,security,bug'
          exempt-pr-labels: 'pinned,security'
