name: Persistence Conformance

on:
  push:
    branches: [master]
    paths:
      - 'packages/ports/persistence/**'
      - 'packages/adapters/persistence-*/**'
      - 'packages/adapters/changestream-*/**'
      - '.github/workflows/persistence-conformance.yml'
  pull_request:
    paths:
      - 'packages/ports/persistence/**'
      - 'packages/adapters/persistence-*/**'
      - 'packages/adapters/changestream-*/**'
      - '.github/workflows/persistence-conformance.yml'
  schedule:
    # Nightly full matrix at 02:00 UTC
    - cron: '0 2 * * *'

concurrency:
  group: persistence-conformance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  postgres:
    name: Postgres Conformance
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
          POSTGRES_DB: platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U platform"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://platform:platform@localhost:5432/platform_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build workspace dependencies
        run: pnpm turbo run build --filter=...@platform/adapter-persistence-postgres
      - run: pnpm --filter @platform/adapter-persistence-postgres test
      - run: pnpm --filter @platform/ports-persistence test

  mssql:
    name: MSSQL Conformance
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: 'Y'
          MSSQL_SA_PASSWORD: Platform!2024
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd="/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Platform!2024' -Q 'SELECT 1' -C"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=15
    env:
      MSSQL_SERVER: localhost
      MSSQL_PORT: '1433'
      MSSQL_DATABASE: platform_test
      MSSQL_USER: sa
      MSSQL_PASSWORD: 'Platform!2024'
      MSSQL_TRUST_SERVER_CERTIFICATE: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build workspace dependencies
        run: pnpm turbo run build --filter=...@platform/adapter-persistence-mssql
      - name: Create test database
        run: |
          /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Platform!2024' \
            -Q "CREATE DATABASE platform_test" -C || true
      - run: pnpm --filter @platform/adapter-persistence-mssql test

  mongo:
    name: MongoDB Conformance
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: platform
          MONGO_INITDB_ROOT_PASSWORD: platform
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand(\"ping\")' --quiet"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      MONGO_URI: mongodb://platform:platform@localhost:27017/?authSource=admin
      MONGO_DATABASE: platform_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build workspace dependencies
        run: pnpm turbo run build --filter=...@platform/adapter-persistence-mongo
      - run: pnpm --filter @platform/adapter-persistence-mongo test

  capability-matrix:
    name: Generate Capability Matrix
    runs-on: ubuntu-latest
    needs: [postgres, mssql, mongo]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsx scripts/generate-capability-matrix.mts
      - name: Upload capability matrix
        uses: actions/upload-artifact@v4
        with:
          name: capability-matrix
          path: docs/contracts/persistence-conformance-report.md
