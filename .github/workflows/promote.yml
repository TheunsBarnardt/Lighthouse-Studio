name: Promote

on:
  push:
    branches:
      - develop
      - staging
      - main

concurrency:
  group: promote-${{ github.ref_name }}
  cancel-in-progress: false # Never cancel an in-flight deployment

jobs:
  # ---------------------------------------------------------------------------
  # Build and push Docker image to GitHub Container Registry
  # ---------------------------------------------------------------------------
  build-image:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Deploy to dev (on push to develop — no approval required)
  # ---------------------------------------------------------------------------
  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest
    needs: build-image
    if: github.ref_name == 'develop'
    environment:
      name: dev
      url: https://dev.${{ vars.DOMAIN }}
    steps:
      - name: Trigger Coolify deploy webhook
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_DEV_WEBHOOK_TOKEN }}" \
            "${{ secrets.COOLIFY_DEV_WEBHOOK_URL }}"

      - name: Wait for deployment to settle
        run: sleep 30

      - name: Smoke test — health check
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://dev.${{ vars.DOMAIN }}/_status" || echo "000")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after 10 attempts"
          exit 1

  # ---------------------------------------------------------------------------
  # Deploy to staging (on push to staging — requires manual approval)
  # Staging is dormant until provisioned; the job runs but the environment gate
  # means it won't reach the deploy step without an authorised reviewer.
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build-image
    if: github.ref_name == 'staging'
    environment:
      name: staging
      url: https://staging.${{ vars.DOMAIN }}
    steps:
      - name: Trigger Coolify deploy webhook
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_STAGING_WEBHOOK_TOKEN }}" \
            "${{ secrets.COOLIFY_STAGING_WEBHOOK_URL }}"

      - name: Wait for deployment to settle
        run: sleep 30

      - name: Smoke test — health check
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://staging.${{ vars.DOMAIN }}/_status" || echo "000")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after 10 attempts"
          exit 1

  # ---------------------------------------------------------------------------
  # Deploy to production (on push to main — requires manual approval + wait timer)
  # Production is dormant until provisioned.
  # ---------------------------------------------------------------------------
  deploy-prod:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-image
    if: github.ref_name == 'main'
    environment:
      name: prod
      url: https://${{ vars.DOMAIN }}
    steps:
      - name: Trigger Coolify deploy webhook
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_PROD_WEBHOOK_TOKEN }}" \
            "${{ secrets.COOLIFY_PROD_WEBHOOK_URL }}"

      - name: Wait for deployment to settle
        run: sleep 60

      - name: Smoke test — health check
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ vars.DOMAIN }}/_status" || echo "000")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after 10 attempts"
          exit 1
