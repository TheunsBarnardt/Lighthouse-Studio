# Observability stack for the platform.
# Deployed as a separate Coolify Resource alongside the platform itself.
# Provides: Grafana, Loki, Tempo, Prometheus, OTel Collector, GlitchTip.
#
# Local dev: pnpm obs:up / pnpm obs:down
# Staging/prod: deployed via Coolify from this file.
#
# Resource limits are tuned for an 8 GB host running both the platform and
# this stack (~6.5 GB total). For 4 GB hosts, see .env.minimal.

name: platform-observability

services:
  # ── OTel Collector ─────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.122.0
    container_name: otel-collector
    restart: unless-stopped
    command: ['--config=/etc/otelcol/config.yaml']
    volumes:
      - ./otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP
    networks:
      - observability
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Loki (log storage) ─────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.4.2
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    networks:
      - observability
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3100/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Prometheus (metrics storage) ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-remote-write-receiver'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - observability
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9090/-/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Tempo (trace storage) ──────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.7.2
    container_name: tempo
    restart: unless-stopped
    command: ['-config.file=/etc/tempo/config.yaml']
    volumes:
      - ./tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/tmp/tempo
    networks:
      - observability
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3200/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Grafana (visualization) ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.6.1
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_SECURITY_ADMIN_USER: '${GRAFANA_ADMIN_USER:-admin}'
      GF_SECURITY_ADMIN_PASSWORD: '${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}'
      GF_SERVER_HTTP_PORT: '3001'
      GF_PATHS_PROVISIONING: '/etc/grafana/provisioning'
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - '3001:3001'
    networks:
      - observability
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  # ── GlitchTip (error tracking) ─────────────────────────────────────────────
  glitchtip-db:
    image: postgres:17-alpine
    container_name: glitchtip-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: '${GLITCHTIP_DB_PASSWORD:?GLITCHTIP_DB_PASSWORD is required}'
    volumes:
      - glitchtip-postgres-data:/var/lib/postgresql/data
    networks:
      - observability
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U glitchtip -d glitchtip']
      interval: 10s
      timeout: 5s
      retries: 5

  glitchtip:
    image: glitchtip/glitchtip:v5.0.0
    container_name: glitchtip
    restart: unless-stopped
    environment:
      DATABASE_URL: 'postgres://glitchtip:${GLITCHTIP_DB_PASSWORD}@glitchtip-db:5432/glitchtip'
      SECRET_KEY: '${GLITCHTIP_SECRET_KEY:?GLITCHTIP_SECRET_KEY is required}'
      EMAIL_URL: '${GLITCHTIP_EMAIL_URL:-consolemail://}'
      GLITCHTIP_DOMAIN: '${GLITCHTIP_DOMAIN:-http://localhost:8000}'
      DEFAULT_FROM_EMAIL: '${GLITCHTIP_FROM_EMAIL:-errors@platform.local}'
      CELERY_WORKER_AUTOSCALE: '1,3'
    ports:
      - '8000:8000'
    networks:
      - observability
    depends_on:
      glitchtip-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  loki-data:
    name: platform-obs-loki-data
  prometheus-data:
    name: platform-obs-prometheus-data
  tempo-data:
    name: platform-obs-tempo-data
  grafana-data:
    name: platform-obs-grafana-data
  glitchtip-postgres-data:
    name: platform-obs-glitchtip-postgres-data

networks:
  observability:
    name: platform-observability
    # External allows the platform stack to attach to this network
    # by setting `external: true` in its own compose file.
