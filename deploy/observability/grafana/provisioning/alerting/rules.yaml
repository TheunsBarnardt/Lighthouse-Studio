apiVersion: 1

groups:
  - orgId: 1
    name: Platform SLO Alerts
    folder: Platform
    interval: 1m
    rules:
      - uid: platform-http-error-rate
        title: 'HTTP Error Rate > 5% (5m)'
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: 'prometheus'
            model:
              expr: 'sum(rate(platform_http_requests_total{status=~"5.."}[5m])) / sum(rate(platform_http_requests_total[5m]))'
              refId: A
          - refId: C
            datasourceUid: '__expr__'
            model:
              conditions:
                - evaluator: { params: [0.05], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last }
              refId: C
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: 'HTTP error rate is above 5%'
          description: '{{ humanizePercentage $values.A.Value }} of HTTP requests are returning 5xx errors.'
        labels:
          severity: warning

      - uid: platform-http-p95-latency
        title: 'HTTP p95 Latency > 2s (10m)'
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: 'prometheus'
            model:
              expr: 'histogram_quantile(0.95, sum(rate(platform_http_request_duration_seconds_bucket[5m])) by (le))'
              refId: A
          - refId: C
            datasourceUid: '__expr__'
            model:
              conditions:
                - evaluator: { params: [2], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last }
              refId: C
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 10m
        annotations:
          summary: 'HTTP p95 latency exceeded 2 seconds'
          description: 'p95 latency is {{ $values.A.Value | printf "%.2f" }}s over the past 10 minutes.'
        labels:
          severity: warning

      - uid: platform-job-failure-rate
        title: 'Job Failure Rate > 10% (15m)'
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 900, to: 0 }
            datasourceUid: 'prometheus'
            model:
              expr: 'sum(rate(platform_jobs_executed_total{status="failed"}[15m])) / sum(rate(platform_jobs_executed_total[15m]))'
              refId: A
          - refId: C
            datasourceUid: '__expr__'
            model:
              conditions:
                - evaluator: { params: [0.1], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last }
              refId: C
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 15m
        annotations:
          summary: 'Job failure rate above 10%'
          description: '{{ humanizePercentage $values.A.Value }} of jobs are failing.'
        labels:
          severity: warning

      - uid: platform-memory-pressure
        title: 'Process Memory > 90% Heap (5m)'
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: 'prometheus'
            model:
              expr: 'nodejs_heap_size_used_bytes / nodejs_heap_size_total_bytes'
              refId: A
          - refId: C
            datasourceUid: '__expr__'
            model:
              conditions:
                - evaluator: { params: [0.9], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last }
              refId: C
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: 'Heap memory usage above 90%'
          description: 'Node.js heap is {{ humanizePercentage $values.A.Value }} full. Risk of OOM.'
        labels:
          severity: critical

  - orgId: 1
    name: Platform Auth Alerts
    folder: Platform
    interval: 1m
    rules:
      - uid: platform-auth-failure-spike
        title: 'Auth Failure Rate > 20% (5m)'
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: 'prometheus'
            model:
              expr: 'sum(rate(platform_service_method_duration_seconds_count{service="AuthService",method="completeSignIn",outcome="failure"}[5m])) / sum(rate(platform_service_method_duration_seconds_count{service="AuthService",method="completeSignIn"}[5m]))'
              refId: A
          - refId: C
            datasourceUid: '__expr__'
            model:
              conditions:
                - evaluator: { params: [0.20], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last }
              refId: C
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: 'Auth failure rate above 20%'
          description: '{{ humanizePercentage $values.A.Value }} of sign-in attempts are failing. Possible brute-force or credential stuffing attack.'
        labels:
          severity: warning
          team: security

      - uid: platform-auth-failure-burst
        title: 'Auth Failures > 100 in 1m (burst)'
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 60, to: 0 }
            datasourceUid: 'prometheus'
            model:
              expr: 'sum(increase(platform_service_method_duration_seconds_count{service="AuthService",method="completeSignIn",outcome="failure"}[1m]))'
              refId: A
          - refId: C
            datasourceUid: '__expr__'
            model:
              conditions:
                - evaluator: { params: [100], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last }
              refId: C
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 1m
        annotations:
          summary: 'More than 100 auth failures in the last minute'
          description: '{{ $values.A.Value | printf "%.0f" }} sign-in failures in 1 minute — likely a credential stuffing or brute-force burst.'
        labels:
          severity: critical
          team: security

      - uid: platform-auth-token-invalid-spike
        title: 'Invalid Token Rate > 30% (5m)'
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: 'prometheus'
            model:
              expr: 'sum(rate(platform_service_method_duration_seconds_count{service="AuthService",method="verifyToken",outcome="failure"}[5m])) / sum(rate(platform_service_method_duration_seconds_count{service="AuthService",method="verifyToken"}[5m]))'
              refId: A
          - refId: C
            datasourceUid: '__expr__'
            model:
              conditions:
                - evaluator: { params: [0.30], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last }
              refId: C
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: 'High rate of invalid token rejections'
          description: '{{ humanizePercentage $values.A.Value }} of token verifications are failing. May indicate replayed or forged tokens.'
        labels:
          severity: warning
          team: security

      - uid: platform-auth-mfa-failure-spike
        title: 'MFA Failure Rate > 30% (5m)'
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: 'prometheus'
            model:
              expr: 'sum(rate(platform_service_method_duration_seconds_count{service="AuthService",method=~".*[Mm]fa.*",outcome="failure"}[5m])) / sum(rate(platform_service_method_duration_seconds_count{service="AuthService",method=~".*[Mm]fa.*"}[5m]))'
              refId: A
          - refId: C
            datasourceUid: '__expr__'
            model:
              conditions:
                - evaluator: { params: [0.30], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last }
              refId: C
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: 'High MFA challenge failure rate'
          description: '{{ humanizePercentage $values.A.Value }} of MFA challenges are failing. May indicate TOTP clock skew or a targeted attack.'
        labels:
          severity: warning
          team: security

contactPoints:
  - orgId: 1
    name: Platform Email
    receivers:
      - uid: platform-email
        type: email
        settings:
          addresses: '${GRAFANA_ALERT_EMAIL:-admin@platform.local}'
          singleEmail: false

  - orgId: 1
    name: Platform ntfy
    receivers:
      - uid: platform-ntfy
        type: webhook
        settings:
          url: '${NTFY_URL:-}'
          httpMethod: POST
          username: ''
          password: ''

policies:
  - orgId: 1
    receiver: Platform Email
    group_by: [alertname]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
