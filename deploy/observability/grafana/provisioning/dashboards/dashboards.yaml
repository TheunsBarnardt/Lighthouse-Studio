apiVersion: 1

providers:
  - name: Platform Dashboards
    orgId: 1
    folder: Platform
    folderUid: platform
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
