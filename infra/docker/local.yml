# Local development Compose stack (offline mode).
# Brings up Postgres + PgBouncer + Redis on the developer's machine, mirroring the dev environment.
# Used when working offline (travel, demos, debugging) or as an alternative to pointing
# at the remote dev environment.
#
# Usage:
#   docker compose -f infra/docker/local.yml up -d
#   docker compose -f infra/docker/local.yml down
#
# Environment variables for .env.local:
#   POSTGRES_URL=postgres://platform_app:platform_app@localhost:5433/platform_dev
#   POSTGRES_DIRECT_URL=postgres://platform_migrate:platform_migrate@localhost:5432/platform_dev
#   REDIS_URL=redis://localhost:6379

name: platform-local

services:
  postgres-local:
    # pgvector/pgvector includes pgvector extension pre-installed on top of Postgres 17.
    image: pgvector/pgvector:pg17
    container_name: postgres-local
    restart: unless-stopped
    command: >
      postgres
      -c statement_timeout=30000
      -c idle_in_transaction_session_timeout=60000
      -c log_min_duration_statement=1000
      -c log_connections=on
    environment:
      POSTGRES_DB: platform_dev
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
    ports:
      - '5432:5432'
    volumes:
      - platform-postgres-local-data:/var/lib/postgresql/data
      - ./init/:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U platform -d platform_dev']
      interval: 5s
      timeout: 3s
      retries: 10

  pgbouncer-local:
    image: bitnami/pgbouncer:1.23.1
    container_name: pgbouncer-local
    restart: unless-stopped
    environment:
      PGBOUNCER_DATABASE: platform_dev
      PGBOUNCER_HOST: postgres-local
      PGBOUNCER_PORT: 5432
      POSTGRESQL_USERNAME: platform_app
      POSTGRESQL_PASSWORD: platform_app
      POSTGRESQL_DATABASE: platform_dev
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 200
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
      PGBOUNCER_AUTH_TYPE: scram-sha-256
      PGBOUNCER_SERVER_RESET_QUERY: ''
      PGBOUNCER_IGNORE_STARTUP_PARAMETERS: extra_float_digits,options
    ports:
      - '5433:5432'
    depends_on:
      postgres-local:
        condition: service_healthy

  redis-local:
    image: redis:7-alpine
    container_name: redis-local
    restart: unless-stopped
    command: redis-server --loglevel warning
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  platform-postgres-local-data:
    name: platform-postgres-local-data
