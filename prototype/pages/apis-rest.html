<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REST API — Platform</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<link rel="stylesheet" href="../shared/shell.css">
<link rel="stylesheet" href="../shared/data-plane.css">
</head>
<body>
<div id="app-root"></div>
<script src="../shared/data.js"></script>
<script src="../shared/shell.js"></script>
<script src="../shared/nav-helpers.js"></script>
<script>
const endpoints = [
  ['contacts', [
    ['GET', '/rest/v1/contacts', 'List contacts', 'Paginated. Filterable.'],
    ['POST', '/rest/v1/contacts', 'Create contact', ''],
    ['GET', '/rest/v1/contacts/:id', 'Get contact', ''],
    ['PATCH', '/rest/v1/contacts/:id', 'Update contact', ''],
    ['DELETE', '/rest/v1/contacts/:id', 'Delete contact', '']
  ]],
  ['deals', [
    ['GET', '/rest/v1/deals', 'List deals', ''],
    ['POST', '/rest/v1/deals', 'Create deal', ''],
    ['GET', '/rest/v1/deals/:id', 'Get deal', ''],
    ['PATCH', '/rest/v1/deals/:id', 'Update deal', ''],
    ['DELETE', '/rest/v1/deals/:id', 'Delete deal', '']
  ]],
  ['Functions', [
    ['POST', '/functions/v1/updateDealStage', 'Update deal stage', 'Triggers onDealWon if applicable'],
    ['POST', '/functions/v1/searchContacts', 'Search contacts', ''],
    ['POST', '/functions/v1/exportDealsCSV', 'Export deals as CSV', '']
  ]]
];

function methodColor(m) {
  return { GET: 'success', POST: 'info', PATCH: 'warning', PUT: 'warning', DELETE: 'danger' }[m] || 'default';
}

Shell.render({
  mode: 'apis',
  contextNav: apisContextNav('rest'),
  dataPlane: false,
  mainContent: `
    <div class="page" style="max-width: 1280px;">
      <div class="page-header">
        <div>
          <h1>REST API</h1>
          <div class="subtitle">Auto-generated from your schema · OpenAPI 3.1 · Versioned · 47 endpoints</div>
        </div>
        <div class="page-header-actions">
          <button class="btn btn-secondary btn-sm">Download OpenAPI</button>
          <button class="btn btn-secondary btn-sm">Postman collection</button>
          <button class="btn btn-primary btn-sm">Try in console</button>
        </div>
      </div>

      <div class="grid grid-3 mb-4">
        <div class="card">
          <div class="card-header"><div class="card-title">Base URL</div></div>
          <div class="code-block" style="font-size: 11px;">https://api.acme.platform.local/rest/v1</div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">Auth</div></div>
          <div class="text-sm">Bearer JWT (recommended) or API key</div>
          <div class="text-xs text-tertiary mt-2">JWT auto-issued by /auth/sign-in. API keys at <a href="apis-keys.html">API Keys</a>.</div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">Rate limits</div></div>
          <div class="text-sm">1,000 req/min per IP</div>
          <div class="text-xs text-tertiary mt-2">10,000 req/min per authenticated user</div>
        </div>
      </div>

      ${endpoints.map(([group, items]) => `
        <div class="card mb-4">
          <div class="card-header"><div class="card-title">${group}</div></div>
          <table class="data-table">
            <thead><tr><th style="width: 80px;">Method</th><th>Path</th><th>Operation</th><th>Notes</th><th></th></tr></thead>
            <tbody>
              ${items.map(([m, p, op, notes]) => `
                <tr style="cursor: pointer" onclick="Shell.toast('Try ' + '${m}' + ' ' + '${p}', 'info')">
                  <td><span class="badge badge-${methodColor(m)} mono">${m}</span></td>
                  <td class="mono text-xs">${p}</td>
                  <td class="text-sm">${op}</td>
                  <td class="text-xs text-secondary">${notes}</td>
                  <td><button class="btn btn-ghost btn-xs" onclick="event.stopPropagation()">Try it</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `).join('')}

      <div class="card">
        <div class="card-header"><div class="card-title">Try it · GET /rest/v1/contacts</div></div>
        <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 16px;">
          <div>
            <div class="text-xs text-tertiary mb-2" style="text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600;">Request</div>
            <div class="code-block" style="font-size: 11px;">curl https://api.acme.platform.local/rest/v1/contacts \\
  -H "Authorization: Bearer eyJ..." \\
  -H "Accept: application/json" \\
  --data-urlencode "limit=10" \\
  --data-urlencode "order=created_at.desc"</div>
          </div>
          <div>
            <div class="text-xs text-tertiary mb-2" style="text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600;">Response · 200 OK</div>
            <div class="code-block" style="font-size: 11px;">{
  "data": [
    { "id": "c1a2-...-8f7e", "name": "Alice Schwartz", "email": "alice@beta.com", ... },
    ...
  ],
  "count": 1247,
  "page": 1
}</div>
          </div>
        </div>
      </div>
    </div>
  `
});
</script>
</body>
</html>
