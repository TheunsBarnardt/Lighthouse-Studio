<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cost & Usage — Platform</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<link rel="stylesheet" href="../shared/shell.css">

</head>
<body>
<div id="app-root"></div>
<script src="../shared/data.js"></script>
<script src="../shared/shell.js"></script>
<script>
const contextNav = {

  sections: [

      { id: 'dashboard', label: 'Dashboard', active: true, href: '#' },
      { id: 'forecasts', label: 'Forecasts', href: '#' }
    ]},
    { heading: 'Breakdown', items: [
      { id: 'by-source', label: 'By source', href: '#' },
      { id: 'by-project', label: 'By project', href: '#' },
      { id: 'by-stage', label: 'By pipeline stage', href: '#' }
    ]},
    { heading: 'Optimisation', items: [
      { id: 'optimise', label: 'Optimisation advisor', href: 'advisors-cost.html' },
      { id: 'budgets', label: 'Budgets & alerts', href: '#' }
    ]}
  ]
};

const stages = [
  ['Stage 1 · Intent', 0.40, 12, '$0.033 avg'],
  ['Stage 2 · PRD', 1.80, 47, '$0.038 avg'],
  ['Stage 3 · Design tokens', 0.80, 23, '$0.035 avg'],
  ['Stage 4 · Schema synthesis', 1.20, 34, '$0.035 avg'],
  ['Stage 6 · UI generation', 12.40, 142, '$0.087 avg · Opus 4.7'],
  ['Stage 7 · Code generation', 4.20, 87, '$0.048 avg'],
  ['Stage 8 · Tests', 1.40, 47, '$0.030 avg'],
  ['Stage 9 · Deployment', 0.60, 47, '$0.013 avg · pre-flight check'],
  ['Stage 10 · Maintenance', 0.60, 18, '$0.033 avg · auto-triage']
];

const projects = [
  ['Internal Sales CRM', 38.20, 77.5, 412],
  ['Marketing Blog', 11.10, 22.5, 98]
];

Shell.render({
  mode: 'cost',
  contextNav,
  dataPlane: false,
  mainContent: `
    <div class="page" style="max-width: 1400px;">
      <div class="page-header">
        <div>
          <h1>Cost & Usage</h1>
          <div class="subtitle">Spend across all sources · This month: $49.30 / $50 budget · Forecast: $54.20</div>
        </div>
        <div class="page-header-actions">
          <select class="select input-h28" style="width: 140px;"><option>This month</option><option>Last 30 days</option><option>Last quarter</option><option>YTD</option></select>
          <button class="btn btn-secondary btn-sm">Export CSV</button>
          <button class="btn btn-secondary btn-sm">Set budget</button>
          <a class="btn btn-primary btn-sm" href="advisors-cost.html">Optimisation →</a>
        </div>
      </div>

      <div class="grid grid-4 mb-4">
        <div class="stat-card"><div class="stat-label">Current month</div><div class="stat-value">$49.30</div><div class="stat-delta text-secondary">99% of budget</div></div>
        <div class="stat-card"><div class="stat-label">Forecast end of month</div><div class="stat-value text-warning">$54.20</div><div class="stat-delta text-warning">+8.4% over budget</div></div>
        <div class="stat-card"><div class="stat-label">vs prior month</div><div class="stat-value">+12%</div><div class="stat-delta text-secondary">$5.40 increase</div></div>

      </div>

      <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 16px;">
        <div class="card">
          <div class="card-header"><div class="card-title">By project</div></div>
          <table class="data-table">
            <thead><tr><th>Project</th><th class="tabular">Spend</th><th class="tabular">Share</th><th class="tabular">AI calls</th></tr></thead>
            <tbody>
              ${projects.map(([n, amt, pct, calls]) => `
                <tr>
                  <td class="font-medium text-sm">${n}</td>
                  <td class="tabular">$${amt.toFixed(2)}</td>
                  <td class="tabular text-xs text-secondary">${pct}%</td>
                  <td class="tabular">${calls}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>

          <table class="data-table">
            <thead><tr><th>Stage</th><th class="tabular">Spend</th><th class="tabular">Calls</th><th>Notes</th></tr></thead>
            <tbody>
              ${stages.map(([n, amt, calls, note]) => `
                <tr>
                  <td class="text-sm">${n}</td>
                  <td class="tabular text-xs">$${amt.toFixed(2)}</td>
                  <td class="tabular text-xs">${calls}</td>
                  <td class="text-xs text-tertiary">${note}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>

      <div class="card mt-4">
        <div class="card-header">
          <div class="card-title">Budget alerts</div>
          <button class="btn btn-secondary btn-sm">+ Alert rule</button>
        </div>
        <div class="inspector-row"><span class="key">Monthly budget</span><span class="val">$50.00</span></div>
        <div class="inspector-row"><span class="key">Alert at 80% spend</span><span class="val text-success">→ Email + Slack #ops</span></div>
        <div class="inspector-row"><span class="key">Alert at 100%</span><span class="val text-success">→ Email + Slack #ops + PagerDuty</span></div>
        <div class="inspector-row"><span class="key">Forecast alert</span><span class="val text-warning">⚠ Forecast exceeds budget by $4.20</span></div>
      </div>
    </div>
  `
