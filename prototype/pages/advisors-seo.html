<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Advisor — Platform</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<link rel="stylesheet" href="../shared/shell.css">
<link rel="stylesheet" href="../shared/data-plane.css">
<style>
.score-ring { width: 96px; height: 96px; position: relative; flex-shrink: 0; }
.score-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.score-ring .ring-bg { fill: none; stroke: var(--bg-hover); stroke-width: 8; }
.score-ring .ring-fg { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 600ms cubic-bezier(0.2, 0, 0, 1); }
.score-ring .num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; }
.score-good { stroke: var(--fg-success); color: var(--fg-success); }
.score-medium { stroke: var(--fg-warning); color: var(--fg-warning); }
.score-bad { stroke: var(--fg-danger); color: var(--fg-danger); }
.audit-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border-default); }
.audit-row:last-child { border: none; }
.audit-icon { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
.audit-icon.pass { background: var(--bg-success-subtle); color: var(--fg-success); }
.audit-icon.fail { background: var(--bg-danger-subtle); color: var(--fg-danger); }
.audit-icon.warn { background: var(--bg-warning-subtle); color: var(--fg-warning); }
</style>
</head>
<body>
<div id="app-root"></div>
<script src="../shared/data.js"></script>
<script src="../shared/shell.js"></script>
<script src="../shared/nav-helpers.js"></script>
<script>
const audits = [
  { cat: 'Crawlability', items: [
    { name: 'Page has a robots.txt', status: 'pass', desc: 'Detected at /robots.txt · valid syntax' },
    { name: 'Page has a sitemap.xml', status: 'pass', desc: 'Detected · 47 URLs · last updated 2 hours ago' },
    { name: 'No noindex meta on indexable pages', status: 'pass', desc: 'All public pages indexable' },
    { name: 'Canonical URLs set', status: 'fail', desc: '14 pages missing <link rel="canonical">' }
  ]},
  { cat: 'Meta tags', items: [
    { name: 'Title tag present and under 60 chars', status: 'warn', desc: '3 pages have titles over 60 chars (truncated in SERP)' },
    { name: 'Meta description present', status: 'fail', desc: '7 pages missing meta description' },
    { name: 'Open Graph tags (og:title, og:image)', status: 'pass', desc: 'All pages have og:title, og:description, og:image' },
    { name: 'Twitter card tags', status: 'pass', desc: 'twitter:card="summary_large_image" set on all pages' }
  ]},
  { cat: 'Structured data', items: [
    { name: 'Schema.org JSON-LD present', status: 'warn', desc: 'Only 4 of 47 pages have structured data' },
    { name: 'Valid JSON-LD syntax', status: 'pass', desc: 'No parse errors' },
    { name: 'Breadcrumb markup', status: 'fail', desc: 'No BreadcrumbList found on any page' }
  ]},
  { cat: 'Internationalisation', items: [
    { name: 'Lang attribute on <html>', status: 'pass', desc: 'lang="en" on all pages' },
    { name: 'Hreflang tags for multilingual', status: 'pass', desc: 'Single language site · not applicable' }
  ]}
];

const passCount = audits.flatMap(a => a.items).filter(i => i.status === 'pass').length;
const failCount = audits.flatMap(a => a.items).filter(i => i.status === 'fail').length;
const warnCount = audits.flatMap(a => a.items).filter(i => i.status === 'warn').length;

const score = 78;
const scoreClass = score >= 90 ? 'score-good' : score >= 50 ? 'score-medium' : 'score-bad';
const C = 2 * Math.PI * 44;
const offset = C - (C * score / 100);

Shell.render({
  mode: 'advisors',
  contextNav: advisorsContextNav('seo'),
  dataPlane: false,
  mainContent: `
    <div class="page" style="max-width: 1280px;">
      <div class="page-header">
        <div>
          <h1>SEO Advisor</h1>
          <div class="subtitle">Search engine optimisation audit · Last scan 12 minutes ago · 47 pages crawled</div>
        </div>
        <div class="page-header-actions">
          <select class="select input-h28" style="width: 180px;"><option>All pages</option><option>Public pages only</option><option>Single page...</option></select>
          <button class="btn btn-secondary btn-sm">Settings</button>
          <button class="btn btn-primary btn-sm" onclick="Shell.toast('Re-scanning all pages...', 'info')">Re-scan</button>
        </div>
      </div>

      <div class="card mb-4" style="display: flex; align-items: center; gap: 24px;">
        <div class="score-ring">
          <svg viewBox="0 0 100 100">
            <circle class="ring-bg" cx="50" cy="50" r="44" />
            <circle class="ring-fg ${scoreClass}" cx="50" cy="50" r="44" stroke-dasharray="${C}" stroke-dashoffset="${offset}" />
          </svg>
          <div class="num ${scoreClass}">${score}</div>
        </div>
        <div style="flex: 1;">
          <div class="text-xs text-tertiary" style="text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;">Overall SEO score</div>
          <div class="font-semibold mt-1" style="font-size: 16px;">Needs attention — fix the 4 failed audits to reach 90+</div>
          <div class="text-secondary text-sm mt-1">Scoring weighted toward crawlability and meta tags. Structured data and breadcrumbs would lift this further.</div>
          <div class="flex gap-3 mt-3">
            <span class="text-sm"><span class="text-success font-semibold">${passCount}</span> passed</span>
            <span class="text-sm"><span class="text-warning font-semibold">${warnCount}</span> warnings</span>
            <span class="text-sm"><span class="text-danger font-semibold">${failCount}</span> failed</span>
          </div>
        </div>
      </div>

      ${audits.map(group => `
        <div class="card mb-4">
          <div class="card-header">
            <div class="card-title">${group.cat}</div>
            <div class="text-xs text-tertiary">${group.items.filter(i => i.status === 'pass').length} of ${group.items.length} passing</div>
          </div>
          ${group.items.map(item => `
            <div class="audit-row">
              <div class="audit-icon ${item.status}">${item.status === 'pass' ? '✓' : item.status === 'fail' ? '✕' : '!'}</div>
              <div style="flex: 1;">
                <div class="font-medium" style="font-size: 13px;">${item.name}</div>
                <div class="text-xs text-secondary mt-1">${item.desc}</div>
              </div>
              ${item.status !== 'pass' ? `<button class="btn btn-secondary btn-sm">Fix in Designer</button>` : ''}
            </div>
          `).join('')}
        </div>
      `).join('')}

      <div class="card">
        <div class="card-header"><div class="card-title">Per-page scores</div></div>
        <table class="data-table">
          <thead><tr><th>URL</th><th class="tabular">Score</th><th>Title</th><th>Meta description</th><th>Structured data</th><th></th></tr></thead>
          <tbody>
            ${[
              ['/', 92, '✓', '✓', '✓ JSON-LD'],
              ['/deals', 84, '✓', '— missing', '— missing'],
              ['/contacts', 88, '✓ (62 chars)', '✓', '— missing'],
              ['/dashboard', 71, '— too long', '— missing', '— missing'],
              ['/sign-in', 95, '✓', '✓', '✓ JSON-LD']
            ].map(([url, s, t, d, sd]) => {
              const c = s >= 90 ? 'success' : s >= 70 ? 'warning' : 'danger';
              return `<tr><td class="mono text-xs">${url}</td><td class="tabular text-${c} font-semibold">${s}</td><td class="text-xs">${t}</td><td class="text-xs">${d}</td><td class="text-xs">${sd}</td><td><button class="btn btn-ghost btn-xs">Inspect</button></td></tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `
});
</script>
</body>
</html>
