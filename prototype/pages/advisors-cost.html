<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cost — Platform</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<link rel="stylesheet" href="../shared/shell.css">
<link rel="stylesheet" href="../shared/data-plane.css">
</head>
<body>
<div id="app-root"></div>
<script src="../shared/data.js"></script>
<script src="../shared/shell.js"></script>
<script src="../shared/nav-helpers.js"></script>
<script>
const opportunities = [
  ['AI tokens · Stage 6 (UI gen)', '$8.40/mo', 'Switch DealKanbanPage to cached prompt template (similar to ContactsTable). Same quality, ~62% fewer input tokens.', 'medium'],
  ['Database storage', '$6.20/mo', 'Vacuum bloated tables (messages, audit_log_archive). Reclaim 1.4 GB.', 'low'],
  ['Idle edge function workers', '$4.10/mo', 'outlookCalendarSync provisioned at 4 workers; only ever runs at 1 concurrent. Drop to 1 + burst.', 'low'],
  ['Storage egress to Backblaze', '$3.20/mo', 'Hot files re-uploaded daily. Cache headers 24h instead of 1h.', 'low'],
  ['Logs retention', '$1.10/mo', 'Verbose API logs retained 30 days. 7 days enough for current SLAs.', 'low']
];

const breakdown = [
  ['AI tokens', 23.40, 47.5, 'Anthropic Claude · Sonnet 4.6 · Opus 4.7 (Stage 6 only)'],
  ['Database (compute)', 12.20, 24.7, 'PostgreSQL · 4 vCPU · 8 GB · 100 GB SSD'],
  ['Database (storage)', 4.80, 9.7, '38 GB used of 100 GB'],
  ['Edge functions', 3.40, 6.9, '142K invocations · avg 87ms'],
  ['Storage', 2.80, 5.7, '1.2 GB · Backblaze B2'],
  ['Realtime', 1.40, 2.8, '147 concurrent connections'],
  ['Logs & monitoring', 1.20, 2.4, '7-day retention']
];

const total = breakdown.reduce((s, b) => s + b[1], 0);

Shell.render({
  mode: 'advisors',
  contextNav: advisorsContextNav('cost'),
  dataPlane: false,
  mainContent: `
    <div class="page" style="max-width: 1280px;">
      <div class="page-header">
        <div>
          <h1>Cost optimisation</h1>
          <div class="subtitle">Spend across all sources · ${total.toFixed(2)} / mo current · ${(total - 23).toFixed(2)} / mo achievable</div>
        </div>
        <div class="page-header-actions">
          <select class="select input-h28" style="width: 140px;"><option>This month</option><option>Last 30 days</option><option>Last quarter</option></select>
          <button class="btn btn-primary btn-sm" onclick="Shell.toast('Re-analysing costs...', 'info')">Re-analyse</button>
        </div>
      </div>

      <div class="grid grid-4 mb-4">
        <div class="stat-card"><div class="stat-label">Current spend</div><div class="stat-value">$${total.toFixed(2)}<span style="font-size: 13px; font-weight: 400; color: var(--fg-secondary);">/mo</span></div><div class="stat-delta text-secondary">vs $50 budget</div></div>
        <div class="stat-card"><div class="stat-label">Identified savings</div><div class="stat-value text-success">$23.00<span style="font-size: 13px; font-weight: 400; color: var(--fg-secondary);">/mo</span></div><div class="stat-delta stat-up">47% reduction</div></div>
        <div class="stat-card"><div class="stat-label">Top driver</div><div class="stat-value">AI</div><div class="stat-delta text-secondary">47.5% of spend</div></div>
        <div class="stat-card"><div class="stat-label">Forecast next month</div><div class="stat-value">$54.20</div><div class="stat-delta text-warning">+9.6% growth</div></div>
      </div>

      <div class="card mb-4">
        <div class="card-header">
          <div class="card-title">Spend breakdown</div>
          <div class="text-xs text-tertiary">Last 30 days</div>
        </div>
        <table class="data-table">
          <thead><tr><th>Source</th><th class="tabular">Amount</th><th class="tabular">Share</th><th>Detail</th></tr></thead>
          <tbody>
            ${breakdown.map(([n, amt, pct, detail]) => `
              <tr>
                <td class="font-medium">${n}</td>
                <td class="tabular">$${amt.toFixed(2)}</td>
                <td class="tabular">
                  <div style="display: flex; align-items: center; gap: 8px;">
                    <span>${pct}%</span>
                    <div style="flex: 1; height: 4px; background: var(--bg-hover); border-radius: 2px; max-width: 80px;">
                      <div style="height: 100%; width: ${pct}%; background: var(--accent-primary); border-radius: 2px;"></div>
                    </div>
                  </div>
                </td>
                <td class="text-xs text-secondary">${detail}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>

      <div class="card mb-4">
        <div class="card-header">
          <div class="card-title">Optimisation opportunities</div>
          <span class="badge badge-success">$23.00 / mo</span>
        </div>
        ${opportunities.map(([n, savings, desc, eff]) => `
          <div class="audit-row">
            <div class="audit-icon warn">$</div>
            <div style="flex: 1;">
              <div class="flex justify-between items-start mb-1">
                <div class="font-medium" style="font-size: 13px;">${n}</div>
                <div class="text-xs text-success font-semibold">Save ${savings}</div>
              </div>
              <div class="text-xs text-secondary">${desc}</div>
              <div class="text-xs text-tertiary mt-1">Effort: ${eff}</div>
            </div>
            <button class="btn btn-secondary btn-sm">Apply</button>
          </div>
        `).join('')}
      </div>

      <div class="card">
        <div class="card-header"><div class="card-title">Cost trend · 90 days</div></div>
        <div style="height: 120px; background: var(--bg-canvas); border-radius: var(--radius-sm); padding: 12px; display: flex; align-items: end; gap: 2px;">
          ${[28,30,32,34,32,35,38,36,40,42,40,44,46,44,46,48,46,48,49,46,48,49,47,49,46,48,50,48,49].map(v => `
            <div style="flex: 1; height: ${(v - 20) * 3}%; background: var(--accent-primary); border-radius: 2px 2px 0 0; opacity: 0.85;" title="$${v}"></div>
          `).join('')}
        </div>
        <div class="flex justify-between text-xs text-tertiary mt-2"><span>90 days ago · $28</span><span>Today · $${total.toFixed(0)}</span></div>
      </div>
    </div>
  `
});
</script>
</body>
</html>
