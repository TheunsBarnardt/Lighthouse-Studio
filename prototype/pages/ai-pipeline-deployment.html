<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deployment — Platform</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<link rel="stylesheet" href="../shared/shell.css">
<link rel="stylesheet" href="../shared/data-plane.css">
<style>
.deploy-step { padding: 10px 12px; border-left: 2px solid var(--border-default); margin-bottom: 8px; padding-left: 16px; }
.deploy-step.complete { border-color: var(--fg-success); }
.deploy-step.active { border-color: var(--accent-primary); background: var(--bg-info-subtle); }
.deploy-step .step-header { display: flex; justify-content: space-between; align-items: center; font-weight: 500; font-size: 13px; }
.deploy-step .step-meta { font-size: 11px; color: var(--fg-tertiary); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>
<div id="app-root"></div>
<script src="../shared/data.js"></script>
<script src="../shared/shell.js"></script>
<script src="../shared/nav-helpers.js"></script>
<script>
const envs = [
  {env:'dev', status:'deployed', version:'v0.1.3', updated:'5 min ago', url:'dev.acme.example.com', author:'Tom Müller', commit:'a3f291c'},
  {env:'staging', status:'deployed', version:'v0.1.2', updated:'2h ago', url:'staging.acme.example.com', author:'Marcus Acker', commit:'b8e147a'},
  {env:'production', status:'deploying', version:'v0.1.0', updated:'3d ago', url:'app.acme.example.com', author:'Joana de Klerk', commit:'4d92e3c'}
];

const steps = [
  ['Pre-flight check', 'complete', '8s'],
  ['Run tests', 'complete', '2m 14s'],
  ['Apply schema migrations', 'complete', '1.2s · 3 applied'],
  ['Deploy server functions', 'active', 'In progress · 4 of 7'],
  ['Deploy UI bundle', 'pending', null],
  ['Health check', 'pending', null],
  ['Promote', 'pending', null]
];

const history = [
  ['v0.1.3', 'dev', 'a3f291c', 'Fix Kanban drag race', 'Tom Müller', '5 min ago', 'success', '47s'],
  ['v0.1.2', 'staging', 'b8e147a', 'Add Outlook integration', 'Marcus Acker', '2 hours ago', 'success', '1m 22s'],
  ['v0.1.2', 'dev', 'b8e147a', 'Add Outlook integration', 'Marcus Acker', '3 hours ago', 'success', '54s'],
  ['v0.1.1', 'production', '7c2f9eb', 'Hotfix: deal stage update', 'Joana de Klerk', 'Yesterday 18:42', 'success', '2m 18s'],
  ['v0.1.1', 'staging', '7c2f9eb', 'Hotfix: deal stage update', 'Joana de Klerk', 'Yesterday 18:14', 'success', '1m 11s'],
  ['v0.1.0', 'production', '4d92e3c', 'Initial release', 'Joana de Klerk', '3 days ago', 'success', '3m 04s'],
  ['v0.0.9', 'production', '2a14d6e', 'Beta release', 'Marcus Acker', '5 days ago', 'rolled-back', '2m 41s']
];

Shell.render({
  mode: 'ai-pipeline',
  contextNav: aiPipelineContextNav('deployment'),
  dataPlane: false,
  mainContent: `
    <div class="page-fullbleed">
      ${Shell.pipelineStepper('deployment')}
      <div class="page" style="max-width: 1400px;">
        <div class="page-header">
          <div>
            <h1 style="font-size: 18px;">Deployment · Continuous</h1>
            <div class="subtitle">Multi-environment promotion · 47 deployments to date · 99.2% success rate</div>
          </div>
          <div class="page-header-actions">
            <button class="btn btn-secondary btn-sm">Settings</button>
            <button class="btn btn-secondary btn-sm">Audit log</button>
            <button class="btn btn-primary btn-sm" onclick="Shell.toast('New deployment dialog', 'info')">+ Deploy</button>
          </div>
        </div>

        <div class="grid grid-3 mb-4">
          ${envs.map(e => `
            <div class="card">
              <div class="flex justify-between items-center mb-2">
                <div class="font-semibold" style="text-transform: uppercase; font-size: 11px; color: var(--fg-tertiary);">${e.env}</div>
                ${e.status === 'deploying' ? '<span class="badge badge-info">Deploying</span>' : '<span class="badge badge-success">Live</span>'}
              </div>
              <div class="font-medium mb-1 mono" style="font-size: 14px;">${e.version}</div>
              <div class="text-xs text-tertiary mb-2">${e.url}</div>
              <div class="flex justify-between items-center text-xs">
                <div>
                  <div class="text-tertiary">${e.updated}</div>
                  <div class="text-secondary">${e.author} · <span class="mono">${e.commit}</span></div>
                </div>
                <div class="flex gap-1">
                  <button class="btn btn-ghost btn-xs">Logs</button>
                  ${e.env === 'production' ? '' : '<button class="btn btn-secondary btn-xs">Promote</button>'}
                </div>
              </div>
            </div>
          `).join('')}
        </div>

        <div class="grid" style="grid-template-columns: 2fr 1fr; gap: 16px;">
          <div class="card">
            <div class="card-header">
              <div class="card-title">In-flight: Production deployment</div>
              <span class="badge badge-info">In progress · 47%</span>
            </div>
            <div class="progress-bar mb-3"><div class="progress-fill" style="width: 47%;"></div></div>
            ${steps.map(([n, s, m]) => `
              <div class="deploy-step ${s}">
                <div class="step-header">
                  <span>${n}</span>
                  ${s === 'complete' ? '<span class="text-success text-xs">✓</span>' : s === 'active' ? '<span style="color: var(--accent-primary);" class="text-xs">●</span>' : ''}
                </div>
                ${m ? `<div class="step-meta">${m}</div>` : ''}
              </div>
            `).join('')}
            <div class="flex gap-2 mt-3" style="justify-content: flex-end;">
              <button class="btn btn-ghost btn-sm">Pause</button>
              <button class="btn btn-destructive btn-sm">Abort & rollback</button>
            </div>
          </div>

          <div>
            <div class="card mb-3">
              <div class="card-header"><div class="card-title">Approvals required</div></div>
              <div class="text-sm mb-3 text-secondary">2 of 2 approvers needed for prod deploys.</div>
              <div class="flex items-center gap-2 mb-2">
                <div class="avatar">JD</div>
                <div style="flex: 1;"><div class="text-sm">Joana de Klerk</div><div class="text-xs text-tertiary">Owner</div></div>
                <span class="badge badge-success">✓ Approved</span>
              </div>
              <div class="flex items-center gap-2">
                <div class="avatar">MA</div>
                <div style="flex: 1;"><div class="text-sm">Marcus Acker</div><div class="text-xs text-tertiary">Architect</div></div>
                <span class="badge badge-success">✓ Approved</span>
              </div>
            </div>
            <div class="card">
              <div class="card-header"><div class="card-title">Health · last 7d</div></div>
              <div class="inspector-row"><span class="key">Uptime</span><span class="val text-success tabular">99.97%</span></div>
              <div class="inspector-row"><span class="key">Failed deploys</span><span class="val tabular">1 of 47</span></div>
              <div class="inspector-row"><span class="key">Avg deploy time</span><span class="val tabular">2m 11s</span></div>
              <div class="inspector-row"><span class="key">Rollbacks</span><span class="val tabular">0</span></div>
            </div>
          </div>
        </div>

        <div class="card mt-4">
          <div class="card-header">
            <div class="card-title">Deployment history</div>
            <button class="btn btn-ghost btn-sm">View all 47</button>
          </div>
          <table class="data-table">
            <thead><tr><th>Version</th><th>Env</th><th>Commit</th><th>Title</th><th>Author</th><th>When</th><th>Status</th><th class="tabular">Duration</th><th></th></tr></thead>
            <tbody>
              ${history.map(([v, env, sha, title, author, when, status, dur]) => `
                <tr>
                  <td class="mono text-xs">${v}</td>
                  <td><span class="badge badge-default">${env}</span></td>
                  <td class="mono text-xs text-secondary">${sha}</td>
                  <td class="text-sm">${title}</td>
                  <td class="text-secondary text-xs">${author}</td>
                  <td class="text-tertiary text-xs">${when}</td>
                  <td>${status === 'success' ? '<span class="badge badge-success">Success</span>' : '<span class="badge badge-warning">Rolled back</span>'}</td>
                  <td class="tabular text-xs">${dur}</td>
                  <td><button class="btn btn-ghost btn-xs">Re-deploy</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>

        <div class="card mt-4">
          <div class="card-header"><div class="card-title">Deployment frequency · 30 days</div></div>
          <div style="height: 100px; background: var(--bg-canvas); border-radius: var(--radius-sm); padding: 12px; display: flex; align-items: end; gap: 3px;">
            ${[1,3,2,4,2,1,3,5,4,3,2,4,6,3,2,4,5,3,4,2,5,4,3,5,4,3,5,6,4,3].map(v => `
              <div style="flex: 1; height: ${v * 14}%; background: var(--accent-primary); border-radius: 2px 2px 0 0; opacity: ${0.5 + v / 12};" title="${v} deploys"></div>
            `).join('')}
          </div>
          <div class="flex justify-between text-xs text-tertiary mt-2"><span>30 days ago</span><span>Today · ~3.4/day avg</span></div>
        </div>
      </div>
    </div>
  `
});
</script>
</body>
</html>
