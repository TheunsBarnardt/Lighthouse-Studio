<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Database Functions — Platform</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<link rel="stylesheet" href="../shared/shell.css">
<link rel="stylesheet" href="../shared/data-plane.css">
</head>
<body>
<div id="app-root"></div>
<script src="../shared/data.js"></script>
<script src="../shared/shell.js"></script>
<script src="../shared/nav-helpers.js"></script>
<script>
const fns = [
  ['handle_new_user', '', 'trigger', 'plpgsql', 'volatile'],
  ['get_pipeline_value', 'p_user_id uuid', 'numeric', 'sql', 'stable'],
  ['recalc_deal_stages', '', 'void', 'plpgsql', 'volatile'],
  ['notify_deal_won', 'p_deal_id uuid', 'void', 'plpgsql', 'volatile'],
  ['contact_search', 'p_query text', 'setof contacts', 'sql', 'stable'],
  ['days_in_stage', 'p_deal_id uuid', 'integer', 'sql', 'stable'],
  ['cleanup_stale_sessions', '', 'integer', 'plpgsql', 'volatile'],
  ['hash_audit_entry', 'p_payload jsonb', 'text', 'sql', 'immutable']
];

Shell.render({
  mode: 'database',
  contextNav: databaseContextNav('functions'),
  dataPlane: true,
  mainContent: `
    <div style="padding: 16px 24px;">
      <div class="page-header">
        <div><h1 style="font-size: 18px;">Database Functions</h1><div class="subtitle">${fns.length} functions in public schema · PostgreSQL functions</div></div>
        <div class="page-header-actions"><button class="btn btn-primary btn-sm">+ New function</button></div>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>Name</th><th>Arguments</th><th>Returns</th><th>Language</th><th>Volatility</th></tr></thead>
          <tbody>
            ${fns.map(([n, args, ret, lang, vol]) => `
              <tr>
                <td><span class="mono">${n}</span></td>
                <td class="text-secondary mono text-xs">${args || '—'}</td>
                <td class="text-secondary mono text-xs">${ret}</td>
                <td><span class="badge badge-default">${lang}</span></td>
                <td class="text-tertiary text-xs">${vol}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `
});
</script>
</body>
</html>
