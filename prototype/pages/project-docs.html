.docs-shell { display: grid; grid-template-columns: 260px 1fr 240px; height: calc(100vh - 44px); }
.docs-toc { background: var(--bg-surface); border-right: 1px solid var(--border-default); overflow-y: auto; padding: 16px; }
.docs-toc h3 { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-tertiary); margin: 16px 0 6px; }
.docs-toc h3:first-child { margin-top: 0; }
.docs-toc a { display: block; padding: 4px 8px; font-size: 12px; color: var(--fg-secondary); border-radius: var(--radius-sm); text-decoration: none; }
.docs-toc a:hover { background: var(--bg-hover); color: var(--fg-primary); }
.docs-toc a.active { background: var(--bg-info-subtle); color: var(--accent-primary); font-weight: 500; }
.docs-toc a .auto-badge { font-size: 8px; background: var(--bg-hover); color: var(--fg-tertiary); padding: 1px 4px; border-radius: 2px; margin-left: 4px; vertical-align: middle; }

.docs-main { background: var(--bg-canvas); overflow-y: auto; padding: 32px 48px; }
.docs-content { max-width: 720px; margin: 0 auto; }
.docs-h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
.docs-subtitle { font-size: 15px; color: var(--fg-secondary); margin-bottom: 24px; }
.docs-content h2 { font-size: 22px; font-weight: 600; margin: 32px 0 12px; padding-top: 16px; border-top: 1px solid var(--border-default); }
.docs-content h3 { font-size: 17px; font-weight: 600; margin: 24px 0 8px; }
.docs-content p { font-size: 14px; line-height: 1.7; margin-bottom: 12px; color: var(--fg-primary); }
.docs-content ul { font-size: 14px; line-height: 1.7; margin: 0 0 12px 20px; color: var(--fg-primary); }
.docs-content code:not(.bl-code-block) { background: var(--bg-hover); padding: 1px 6px; border-radius: 3px; font-size: 12px; font-family: 'JetBrains Mono', monospace; }
.docs-content pre { background: oklch(0.18 0.005 250); color: oklch(0.92 0.005 250); padding: 16px; border-radius: var(--radius-sm); font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.6; overflow-x: auto; margin-bottom: 16px; }
.docs-callout { padding: 12px 16px; border-left: 3px solid var(--accent-primary); background: var(--bg-info-subtle); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; margin: 16px 0; font-size: 13px; }
.docs-callout.warn { border-color: var(--fg-warning); background: var(--bg-warning-subtle); }
.docs-content table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px; }
.docs-content table th, .docs-content table td { padding: 8px 12px; border-bottom: 1px solid var(--border-default); text-align: left; }
.docs-content table th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--fg-tertiary); }

.docs-meta { background: var(--bg-surface); border-left: 1px solid var(--border-default); padding: 16px; overflow-y: auto; }

.auto-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg-info-subtle); border: 1px solid var(--accent-primary); border-radius: var(--radius-sm); font-size: 12px; margin-bottom: 16px; }
.auto-bar .icon { width: 18px; height: 18px; background: var(--accent-primary); color: var(--accent-primary-fg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }

          <h2>What this is</h2>
          <p>Internal Sales CRM is the CRM Acme's sales team uses day-to-day. It tracks <code>contacts</code>, <code>deals</code>, and <code>call_notes</code>, integrates with Outlook calendar for activity tracking, and exposes a Kanban view of the pipeline.</p>

          <p>This documentation is generated continuously from the live system — when the schema changes or a new component is generated, this site updates within seconds.</p>

          <h2>Quickstart</h2>
          <p>Sign in at <code>app.acme.platform.local</code> with your Microsoft 365 account. The platform automatically maps your Entra ID role to the appropriate CRM permissions.</p>

          <pre>// Connect with the JS SDK
import { createClient } from '@acme/platform-js';

const platform = createClient({
  url: 'https://api.acme.platform.local',
  apiKey: process.env.PLATFORM_API_KEY
});

const { data: deals } = await platform
  .from('deals')
  .select('id, title, amount, stage, owner(name)')
  .eq('stage', 'NEGOTIATION');</pre>

            <li>Edge functions sandboxed per project (CPU, memory, egress allowlist)</li>
            <li>Microsoft Entra ID integration for authentication</li>
          </ul>
