<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Database Indexes — Platform</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<link rel="stylesheet" href="../shared/shell.css">
<link rel="stylesheet" href="../shared/data-plane.css">
</head>
<body>
<div id="app-root"></div>
<script src="../shared/data.js"></script>
<script src="../shared/shell.js"></script>
<script src="../shared/nav-helpers.js"></script>
<script>
const indexes = [
  ['contacts_pkey', 'contacts', 'btree', '(id)', '128 kB'],
  ['contacts_email_idx', 'contacts', 'btree', '(email)', '96 kB'],
  ['contacts_company_idx', 'contacts', 'btree', '(company)', '64 kB'],
  ['deals_pkey', 'deals', 'btree', '(id)', '32 kB'],
  ['deals_contact_id_idx', 'deals', 'btree', '(contact_id)', '24 kB'],
  ['deals_stage_idx', 'deals', 'btree', '(stage)', '16 kB'],
  ['deals_owner_id_idx', 'deals', 'btree', '(owner_id)', '24 kB'],
  ['activities_deal_id_idx', 'activities', 'btree', '(deal_id)', '16 kB'],
  ['audit_log_pkey', 'audit_log', 'btree', '(id)', '256 kB'],
  ['audit_log_actor_id_idx', 'audit_log', 'btree', '(actor_id)', '128 kB']
];

Shell.render({
  mode: 'database',
  contextNav: databaseContextNav('indexes'),
  dataPlane: true,
  mainContent: `
    <div style="padding: 16px 24px;">
      <div class="page-header">
        <div><h1 style="font-size: 18px;">Indexes</h1><div class="subtitle">${indexes.length} indexes across ${MOCK.tables.length} tables</div></div>
        <div class="page-header-actions"><button class="btn btn-primary btn-sm">+ New index</button></div>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>Name</th><th>Table</th><th>Type</th><th>Columns</th><th class="tabular">Size</th></tr></thead>
          <tbody>
            ${indexes.map(r => `<tr><td class="mono">${r[0]}</td><td class="mono text-xs">${r[1]}</td><td><span class="badge badge-default">${r[2]}</span></td><td class="mono text-xs text-secondary">${r[3]}</td><td class="tabular text-xs">${r[4]}</td></tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `
});
</script>
</body>
</html>
