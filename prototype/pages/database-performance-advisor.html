<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance Advisor — Platform</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<link rel="stylesheet" href="../shared/shell.css">
<link rel="stylesheet" href="../shared/data-plane.css">
</head>
<body>
<div id="app-root"></div>
<script src="../shared/data.js"></script>
<script src="../shared/shell.js"></script>
<script src="../shared/nav-helpers.js"></script>
<script>
Shell.render({
  mode: 'database',
  contextNav: databaseContextNav('performance-advisor'),
  dataPlane: true,
  mainContent: `
    <div style="padding: 16px 24px;">
      <div class="page-header">
        <div><h1 style="font-size: 18px;">Performance Advisor</h1><div class="subtitle">7 optimizations recommended</div></div>
      </div>
      
      ${[
        ['Missing index on `contacts.company`', 'Frequent filter without an index. p95 1.8s.', '~80% improvement'],
        ['Sequential scan on `audit_log`', 'Filter by `actor_id` lacks index.', '~95% improvement'],
        ['Unused index `deals_old_stage_idx`', 'Not used in 30 days.', 'Saves 24 kB'],
        ['Bloated table `messages`', '64 kB allocated for 47 rows.', 'Reclaims 56 kB']
      ].map(([t, d, i]) => `
        <div class="card mb-3">
          <div class="flex justify-between items-start">
            <div>
              <strong>${t}</strong>
              <div class="text-secondary text-sm mt-1">${d}</div>
              <div class="text-success text-xs mt-2">${i}</div>
            </div>
            <button class="btn btn-secondary btn-sm">View SQL</button>
          </div>
        </div>
      `).join('')}
   
    </div>
  `
});
</script>
</body>
</html>
