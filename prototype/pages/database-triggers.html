<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Database Triggers — Platform</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<link rel="stylesheet" href="../shared/shell.css">
<link rel="stylesheet" href="../shared/data-plane.css">
</head>
<body>
<div id="app-root"></div>
<script src="../shared/data.js"></script>
<script src="../shared/shell.js"></script>
<script src="../shared/nav-helpers.js"></script>
<script>
const triggers = [
  ['on_user_created', 'auth.users', 'AFTER INSERT', 'handle_new_user', 'For each row'],
  ['on_deal_stage_changed', 'public.deals', 'AFTER UPDATE OF stage', 'notify_stage_change', 'For each row'],
  ['on_deal_won', 'public.deals', 'AFTER UPDATE', 'notify_deal_won', 'For each row'],
  ['enforce_workspace_scope', 'public.contacts', 'BEFORE INSERT, UPDATE', 'check_workspace', 'For each row'],
  ['audit_changes', 'public.deals', 'AFTER INSERT, UPDATE, DELETE', 'log_audit_event', 'For each row']
];

Shell.render({
  mode: 'database',
  contextNav: databaseContextNav('triggers'),
  dataPlane: true,
  mainContent: `
    <div style="padding: 16px 24px;">
      <div class="page-header">
        <div><h1 style="font-size: 18px;">Triggers</h1><div class="subtitle">${triggers.length} triggers</div></div>
        <div class="page-header-actions"><button class="btn btn-primary btn-sm">+ New trigger</button></div>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>Name</th><th>Table</th><th>Event</th><th>Function</th><th>Activation</th></tr></thead>
          <tbody>
            ${triggers.map(r => `<tr><td class="mono text-xs">${r[0]}</td><td class="mono text-xs">${r[1]}</td><td class="text-secondary text-xs">${r[2]}</td><td class="mono text-xs">${r[3]}</td><td class="text-tertiary text-xs">${r[4]}</td></tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `
});
</script>
</body>
</html>
