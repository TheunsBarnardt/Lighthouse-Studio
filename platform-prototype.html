<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platform Prototype</title>
<style>
/* =========================================================================
   DESIGN TOKENS (from platform-ui-design-guide.md)
   ========================================================================= */
:root {
  --bg-canvas: oklch(0.985 0.002 250);
  --bg-surface: oklch(1 0 0);
  --bg-surface-2: oklch(0.99 0.002 250);
  --bg-overlay: oklch(0.20 0.02 250 / 0.5);
  --bg-input: oklch(1 0 0);
  --bg-hover: oklch(0.96 0.005 250);
  --bg-pressed: oklch(0.93 0.008 250);
  --bg-selected: oklch(0.94 0.04 250);
  --bg-success-subtle: oklch(0.96 0.04 145);
  --bg-warning-subtle: oklch(0.97 0.05 75);
  --bg-danger-subtle: oklch(0.96 0.04 25);
  --bg-info-subtle: oklch(0.96 0.04 230);

  --fg-primary: oklch(0.20 0.005 250);
  --fg-secondary: oklch(0.45 0.005 250);
  --fg-tertiary: oklch(0.60 0.005 250);
  --fg-disabled: oklch(0.75 0.005 250);
  --fg-on-accent: oklch(0.99 0 0);
  --fg-success: oklch(0.40 0.14 145);
  --fg-warning: oklch(0.45 0.14 75);
  --fg-danger: oklch(0.45 0.18 25);
  --fg-info: oklch(0.40 0.14 230);

  --border-default: oklch(0.91 0.005 250);
  --border-emphasis: oklch(0.85 0.008 250);
  --border-focus: oklch(0.50 0.20 250);

  --accent-primary: oklch(0.50 0.20 250);
  --accent-primary-hover: oklch(0.45 0.20 250);
  --accent-primary-pressed: oklch(0.40 0.20 250);
  --accent-primary-subtle: oklch(0.94 0.06 250);

  --radius-none: 0;
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --radius-full: 9999px;

  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.06), 0 1px 1px oklch(0 0 0 / 0.04);
  --shadow-md: 0 4px 8px oklch(0 0 0 / 0.08), 0 2px 4px oklch(0 0 0 / 0.06);
  --shadow-lg: 0 8px 16px oklch(0 0 0 / 0.10), 0 4px 8px oklch(0 0 0 / 0.06);

  --motion-fast: 100ms;
  --motion-base: 180ms;
  --motion-slow: 280ms;
  --ease-standard: cubic-bezier(0.2, 0, 0, 1);
}

[data-theme="dark"] {
  --bg-canvas: oklch(0.14 0.005 250);
  --bg-surface: oklch(0.18 0.005 250);
  --bg-surface-2: oklch(0.21 0.005 250);
  --bg-overlay: oklch(0 0 0 / 0.6);
  --bg-input: oklch(0.16 0.005 250);
  --bg-hover: oklch(0.22 0.005 250);
  --bg-pressed: oklch(0.26 0.008 250);
  --bg-selected: oklch(0.30 0.04 250);
  --bg-success-subtle: oklch(0.25 0.04 145);
  --bg-warning-subtle: oklch(0.27 0.05 75);
  --bg-danger-subtle: oklch(0.27 0.04 25);
  --bg-info-subtle: oklch(0.25 0.04 230);

  --fg-primary: oklch(0.92 0.003 250);
  --fg-secondary: oklch(0.72 0.005 250);
  --fg-tertiary: oklch(0.55 0.005 250);
  --fg-disabled: oklch(0.40 0.005 250);

  --border-default: oklch(0.27 0.005 250);
  --border-emphasis: oklch(0.35 0.008 250);

  --accent-primary: oklch(0.65 0.18 245);
  --accent-primary-hover: oklch(0.70 0.18 245);
  --accent-primary-subtle: oklch(0.30 0.10 245);
}

/* =========================================================================
   RESET & BASE
   ========================================================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
  font-size: 13px;
  line-height: 20px;
  color: var(--fg-primary);
  background: var(--bg-canvas);
  -webkit-font-smoothing: antialiased;
}
button, input, textarea, select { font: inherit; color: inherit; }
button { cursor: pointer; background: none; border: none; }
a { color: var(--accent-primary); text-decoration: none; }
a:hover { text-decoration: underline; }
.tabular { font-variant-numeric: tabular-nums; }
.mono { font-family: 'JetBrains Mono', ui-monospace, 'Cascadia Code', Menlo, monospace; }

/* =========================================================================
   APP SHELL
   ========================================================================= */
.app {
  display: grid;
  grid-template-rows: 48px 1fr;
  grid-template-columns: 240px 1fr;
  grid-template-areas: "topbar topbar" "sidenav main";
  height: 100vh;
}
.app.nav-collapsed { grid-template-columns: 56px 1fr; }

.topbar {
  grid-area: topbar;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-default);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 16px;
  z-index: 10;
}
.topbar-logo {
  font-weight: 600;
  font-size: 14px;
  color: var(--fg-primary);
  display: flex;
  align-items: center;
  gap: 8px;
}
.topbar-logo .logo-mark {
  width: 20px; height: 20px;
  background: var(--accent-primary);
  border-radius: var(--radius-sm);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 11px;
  font-weight: 700;
}
.topbar-workspace {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  font-size: 12px;
  cursor: pointer;
  background: var(--bg-surface);
}
.topbar-workspace:hover { background: var(--bg-hover); }
.topbar-breadcrumbs {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--fg-secondary);
}
.topbar-breadcrumbs .sep { color: var(--fg-tertiary); }
.topbar-breadcrumbs .current { color: var(--fg-primary); font-weight: 500; }
.topbar-actions { display: flex; align-items: center; gap: 4px; }

.icon-btn {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--fg-secondary);
  font-size: 14px;
  transition: background var(--motion-fast) var(--ease-standard);
}
.icon-btn:hover { background: var(--bg-hover); color: var(--fg-primary); }

.kbd {
  display: inline-flex;
  align-items: center;
  padding: 1px 4px;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--fg-secondary);
  background: var(--bg-surface-2);
  margin-left: 6px;
}

.cmdk-trigger {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  font-size: 12px;
  color: var(--fg-tertiary);
  cursor: pointer;
  background: var(--bg-surface);
  min-width: 200px;
}
.cmdk-trigger:hover { background: var(--bg-hover); }

/* SIDE NAV */
.sidenav {
  grid-area: sidenav;
  background: var(--bg-surface);
  border-right: 1px solid var(--border-default);
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
}
.sidenav-section {
  margin-bottom: 16px;
}
.sidenav-heading {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--fg-tertiary);
  padding: 8px 10px 4px;
}
.sidenav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  color: var(--fg-secondary);
  cursor: pointer;
  font-size: 13px;
  transition: background var(--motion-fast) var(--ease-standard);
  user-select: none;
}
.sidenav-item:hover { background: var(--bg-hover); color: var(--fg-primary); }
.sidenav-item.active {
  background: var(--bg-selected);
  color: var(--accent-primary);
  font-weight: 500;
}
.sidenav-item .icon {
  width: 16px; height: 16px;
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: currentColor;
}
.sidenav-item .badge {
  margin-left: auto;
  font-size: 10px;
  padding: 1px 5px;
  border-radius: var(--radius-full);
  background: var(--accent-primary-subtle);
  color: var(--accent-primary);
  font-weight: 500;
}
.app.nav-collapsed .sidenav-heading,
.app.nav-collapsed .sidenav-item .label,
.app.nav-collapsed .sidenav-item .badge { display: none; }
.app.nav-collapsed .sidenav-item { justify-content: center; padding: 6px; }

.sidenav-footer {
  margin-top: auto;
  padding-top: 8px;
  border-top: 1px solid var(--border-default);
}

/* MAIN */
.main {
  grid-area: main;
  overflow: auto;
  background: var(--bg-canvas);
}

/* =========================================================================
   PAGE PATTERNS
   ========================================================================= */
.page {
  max-width: 1440px;
  margin: 0 auto;
  padding: 24px;
}
.page-fullbleed { padding: 0; max-width: 100%; }

.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 24px;
  gap: 16px;
}
.page-header h1 {
  font-size: 22px;
  font-weight: 600;
  line-height: 30px;
  color: var(--fg-primary);
  margin-bottom: 4px;
}
.page-header .subtitle {
  font-size: 13px;
  color: var(--fg-secondary);
}
.page-header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.section-heading {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--fg-primary);
}

/* =========================================================================
   COMPONENTS
   ========================================================================= */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 12px;
  height: 32px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  transition: all var(--motion-fast) var(--ease-standard);
  border: 1px solid transparent;
  user-select: none;
}
.btn-primary { background: var(--accent-primary); color: var(--fg-on-accent); }
.btn-primary:hover { background: var(--accent-primary-hover); }
.btn-primary:active { background: var(--accent-primary-pressed); }
.btn-secondary { background: var(--bg-surface); color: var(--fg-primary); border-color: var(--border-default); }
.btn-secondary:hover { background: var(--bg-hover); border-color: var(--border-emphasis); }
.btn-ghost { background: transparent; color: var(--fg-secondary); }
.btn-ghost:hover { background: var(--bg-hover); color: var(--fg-primary); }
.btn-destructive { background: var(--fg-danger); color: white; }
.btn-destructive:hover { opacity: 0.9; }
.btn-sm { height: 28px; padding: 0 10px; font-size: 12px; }
.btn-lg { height: 40px; padding: 0 16px; font-size: 14px; }
.btn[disabled], .btn.disabled { opacity: 0.5; cursor: not-allowed; }

.input, .select, .textarea {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  font-size: 13px;
  color: var(--fg-primary);
  transition: border-color var(--motion-fast) var(--ease-standard);
}
.input:focus, .select:focus, .textarea:focus {
  outline: none;
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px oklch(0.50 0.20 250 / 0.15);
}
.input-h32 { height: 32px; }
.textarea { resize: vertical; min-height: 80px; }

.field-group { margin-bottom: 16px; }
.field-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--fg-primary);
  margin-bottom: 4px;
}
.field-helper { font-size: 11px; color: var(--fg-tertiary); margin-top: 4px; }
.field-required { color: var(--fg-danger); margin-left: 2px; }

.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: var(--radius-full);
  font-size: 11px;
  font-weight: 500;
  line-height: 16px;
}
.badge-default { background: var(--bg-hover); color: var(--fg-secondary); }
.badge-success { background: var(--bg-success-subtle); color: var(--fg-success); }
.badge-warning { background: var(--bg-warning-subtle); color: var(--fg-warning); }
.badge-danger { background: var(--bg-danger-subtle); color: var(--fg-danger); }
.badge-info { background: var(--bg-info-subtle); color: var(--fg-info); }
.badge-accent { background: var(--accent-primary-subtle); color: var(--accent-primary); }

.card {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  padding: 16px;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-default);
}
.card-title {
  font-weight: 600;
  font-size: 14px;
  color: var(--fg-primary);
}

/* TABLE */
.table-wrap {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.table-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border-default);
}
.table-toolbar .input { max-width: 240px; }
table.data-table {
  width: 100%;
  border-collapse: collapse;
}
table.data-table th {
  height: 36px;
  padding: 0 12px;
  text-align: left;
  background: var(--bg-surface-2);
  border-bottom: 1px solid var(--border-default);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--fg-secondary);
  user-select: none;
  position: sticky;
  top: 0;
  z-index: 1;
}
table.data-table td {
  height: 32px;
  padding: 0 12px;
  border-bottom: 1px solid var(--border-default);
  font-size: 13px;
  vertical-align: middle;
}
table.data-table tbody tr { transition: background var(--motion-fast) var(--ease-standard); }
table.data-table tbody tr:hover { background: var(--bg-hover); }
table.data-table tbody tr:last-child td { border-bottom: none; }
table.data-table .col-actions { width: 60px; text-align: right; }

/* STAT CARD */
.stat-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  padding: 16px;
}
.stat-card .stat-label {
  font-size: 12px;
  color: var(--fg-secondary);
  margin-bottom: 4px;
}
.stat-card .stat-value {
  font-size: 22px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--fg-primary);
}
.stat-card .stat-delta {
  font-size: 11px;
  margin-top: 4px;
}
.stat-up { color: var(--fg-success); }
.stat-down { color: var(--fg-danger); }

/* PIPELINE STEPPER */
.pipeline-stepper {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 12px 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  overflow-x: auto;
  margin-bottom: 16px;
}
.pipeline-step {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  white-space: nowrap;
  cursor: pointer;
  color: var(--fg-secondary);
  transition: all var(--motion-fast) var(--ease-standard);
}
.pipeline-step:hover { background: var(--bg-hover); color: var(--fg-primary); }
.pipeline-step.active { background: var(--bg-selected); color: var(--accent-primary); font-weight: 500; }
.pipeline-step.complete { color: var(--fg-success); }
.pipeline-step .dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 1.5px solid currentColor;
  flex-shrink: 0;
  position: relative;
}
.pipeline-step.complete .dot::after {
  content: '';
  position: absolute;
  width: 5px; height: 8px;
  border-right: 1.5px solid currentColor;
  border-bottom: 1.5px solid currentColor;
  transform: rotate(45deg);
  top: 1px;
  left: 4px;
}
.pipeline-step.active .dot { background: currentColor; }
.pipeline-step .arrow {
  color: var(--fg-tertiary);
  font-size: 10px;
}

/* TABS */
.tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--border-default);
  margin-bottom: 16px;
}
.tab {
  padding: 8px 12px;
  font-size: 13px;
  color: var(--fg-secondary);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all var(--motion-fast) var(--ease-standard);
  font-weight: 500;
}
.tab:hover { color: var(--fg-primary); }
.tab.active {
  color: var(--accent-primary);
  border-color: var(--accent-primary);
}

/* DIALOG */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg-overlay);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fadeIn var(--motion-base) var(--ease-standard);
}
.modal {
  background: var(--bg-surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  width: 480px;
  max-width: calc(100vw - 32px);
  max-height: calc(100vh - 32px);
  overflow: auto;
  animation: scaleIn var(--motion-base) var(--ease-standard);
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-default);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-title { font-size: 14px; font-weight: 600; }
.modal-body { padding: 20px; }
.modal-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border-default);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes scaleIn { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* TOAST */
.toast-container {
  position: fixed;
  top: 64px;
  right: 16px;
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-left-width: 3px;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-md);
  padding: 10px 14px;
  min-width: 280px;
  max-width: 380px;
  font-size: 13px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  animation: slideInRight var(--motion-base) var(--ease-standard);
}
.toast.success { border-left-color: var(--fg-success); }
.toast.warning { border-left-color: var(--fg-warning); }
.toast.danger { border-left-color: var(--fg-danger); }
.toast.info { border-left-color: var(--fg-info); }
.toast .toast-icon { flex-shrink: 0; margin-top: 1px; }
.toast .toast-content { flex: 1; }
.toast .toast-title { font-weight: 500; margin-bottom: 2px; }
.toast .toast-msg { color: var(--fg-secondary); font-size: 12px; }
@keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* THREE-PANE */
.three-pane {
  display: grid;
  grid-template-columns: 240px 1fr 320px;
  height: calc(100vh - 48px);
  background: var(--bg-canvas);
}
.three-pane .pane-left, .three-pane .pane-right {
  background: var(--bg-surface);
  overflow: auto;
  padding: 16px;
}
.three-pane .pane-left { border-right: 1px solid var(--border-default); }
.three-pane .pane-right { border-left: 1px solid var(--border-default); }
.three-pane .pane-center { overflow: auto; padding: 24px; }

/* INSPECTOR */
.inspector-section {
  padding-bottom: 16px;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--border-default);
}
.inspector-section:last-child { border: none; margin: 0; padding: 0; }
.inspector-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--fg-tertiary);
  margin-bottom: 6px;
}
.inspector-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  font-size: 12px;
}
.inspector-row .key { color: var(--fg-secondary); }
.inspector-row .val { color: var(--fg-primary); font-weight: 500; }

/* CANVAS / SCHEMA / FLOW */
.canvas {
  background: var(--bg-canvas);
  background-image: radial-gradient(circle, var(--border-default) 1px, transparent 1px);
  background-size: 24px 24px;
  height: 100%;
  position: relative;
  overflow: auto;
}
.schema-table {
  position: absolute;
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  min-width: 200px;
  overflow: hidden;
  cursor: move;
}
.schema-table.selected {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 2px oklch(0.50 0.20 250 / 0.2);
}
.schema-table-header {
  background: var(--accent-primary-subtle);
  color: var(--accent-primary);
  padding: 6px 10px;
  font-size: 12px;
  font-weight: 600;
  border-bottom: 1px solid var(--border-default);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.schema-table-header .table-icon { font-size: 11px; }
.schema-column {
  padding: 4px 10px;
  font-size: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border-default);
}
.schema-column:last-child { border-bottom: none; }
.schema-column .col-name { color: var(--fg-primary); }
.schema-column .col-type {
  color: var(--fg-tertiary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
}
.schema-column.pk { background: oklch(0.97 0.04 75 / 0.5); }
.schema-column.fk { background: oklch(0.97 0.03 145 / 0.5); }

/* CHAT */
.chat {
  display: flex;
  flex-direction: column;
  height: 100%;
}
.chat-messages {
  flex: 1;
  overflow: auto;
  padding: 16px 24px;
}
.chat-message {
  margin-bottom: 16px;
  max-width: 720px;
}
.chat-message.user { margin-left: auto; }
.chat-message .role {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--fg-tertiary);
  margin-bottom: 4px;
}
.chat-message.user .role { color: var(--accent-primary); }
.chat-message .bubble {
  padding: 10px 14px;
  border-radius: var(--radius-md);
  font-size: 13px;
  line-height: 20px;
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
}
.chat-message.user .bubble {
  background: var(--bg-selected);
  border-color: var(--accent-primary-subtle);
}
.chat-message .reasoning {
  margin-top: 6px;
  font-size: 11px;
  color: var(--fg-tertiary);
  padding: 6px 10px;
  border-left: 2px solid var(--border-default);
  cursor: pointer;
}
.chat-message .reasoning .label {
  font-weight: 500;
  color: var(--fg-secondary);
  display: flex;
  align-items: center;
  gap: 4px;
}
.chat-input-bar {
  padding: 12px 24px;
  border-top: 1px solid var(--border-default);
  background: var(--bg-surface);
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.chat-input-bar .textarea { flex: 1; min-height: 36px; max-height: 120px; }

/* BRIEF PREVIEW PANEL */
.brief-section {
  padding: 12px;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  margin-bottom: 8px;
  background: var(--bg-surface);
}
.brief-section.empty { background: var(--bg-canvas); }
.brief-section.tentative { border-color: var(--fg-warning); }
.brief-section.confident { border-color: var(--fg-success); }
.brief-section .brief-section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.brief-section .brief-section-title {
  font-size: 12px;
  font-weight: 600;
}
.brief-section .brief-section-content {
  font-size: 12px;
  color: var(--fg-secondary);
  line-height: 18px;
}
.brief-section.empty .brief-section-content {
  color: var(--fg-tertiary);
  font-style: italic;
}
.brief-section .status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border-emphasis);
}
.brief-section.tentative .status-dot { background: var(--fg-warning); }
.brief-section.confident .status-dot { background: var(--fg-success); }

/* APPROVAL ROUTING */
.approval-card {
  padding: 12px;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  background: var(--bg-surface);
}
.approver-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  font-size: 12px;
}
.avatar {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--accent-primary-subtle);
  color: var(--accent-primary);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  flex-shrink: 0;
}

/* CODE BLOCKS */
.code-block {
  background: var(--bg-surface-2);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 18px;
  color: var(--fg-primary);
  overflow-x: auto;
  white-space: pre;
}

/* COMMAND PALETTE */
.cmdk-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg-overlay);
  z-index: 700;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 100px;
  animation: fadeIn var(--motion-fast) var(--ease-standard);
}
.cmdk {
  width: 640px;
  max-width: calc(100vw - 32px);
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}
.cmdk-input {
  width: 100%;
  padding: 14px 18px;
  font-size: 14px;
  border: none;
  border-bottom: 1px solid var(--border-default);
  outline: none;
  background: var(--bg-surface);
  color: var(--fg-primary);
}
.cmdk-results { max-height: 400px; overflow-y: auto; padding: 6px; }
.cmdk-group-heading {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--fg-tertiary);
  padding: 8px 12px 4px;
}
.cmdk-item {
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  user-select: none;
}
.cmdk-item:hover, .cmdk-item.selected { background: var(--bg-selected); color: var(--accent-primary); }

/* COLOR SWATCH */
.swatch-row {
  display: grid;
  grid-template-columns: repeat(11, 1fr);
  gap: 4px;
  margin-bottom: 8px;
}
.swatch {
  aspect-ratio: 1;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-default);
}

/* PROGRESS */
.progress-bar {
  height: 6px;
  background: var(--bg-hover);
  border-radius: var(--radius-full);
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent-primary);
  transition: width var(--motion-base) var(--ease-standard);
}

/* DEPLOYMENT TIMELINE */
.deploy-step {
  padding: 12px 16px;
  border-left: 2px solid var(--border-default);
  margin-left: 12px;
  position: relative;
}
.deploy-step::before {
  content: '';
  position: absolute;
  left: -7px;
  top: 16px;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--bg-surface);
  border: 2px solid var(--border-emphasis);
}
.deploy-step.complete::before {
  background: var(--fg-success);
  border-color: var(--fg-success);
}
.deploy-step.active::before {
  background: var(--accent-primary);
  border-color: var(--accent-primary);
  animation: pulse 1.5s var(--ease-standard) infinite;
}
.deploy-step.failed::before {
  background: var(--fg-danger);
  border-color: var(--fg-danger);
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 oklch(0.50 0.20 250 / 0.5); }
  50% { box-shadow: 0 0 0 6px oklch(0.50 0.20 250 / 0); }
}
.deploy-step .step-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 500;
}
.deploy-step .step-meta {
  font-size: 11px;
  color: var(--fg-tertiary);
  margin-top: 2px;
}

/* GENERATED APP PREVIEW */
.app-preview-frame {
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  overflow: hidden;
  background: white;
  height: 600px;
  display: flex;
  flex-direction: column;
}
.app-preview-bar {
  padding: 8px 12px;
  background: var(--bg-surface-2);
  border-bottom: 1px solid var(--border-default);
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--fg-secondary);
}
.app-preview-bar .url-bar {
  flex: 1;
  padding: 4px 10px;
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}

/* GRID HELPERS */
.grid { display: grid; gap: 16px; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.flex { display: flex; }
.flex-col { display: flex; flex-direction: column; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.gap-4 { gap: 16px; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }

/* UTILS */
.text-secondary { color: var(--fg-secondary); }
.text-tertiary { color: var(--fg-tertiary); }
.text-success { color: var(--fg-success); }
.text-danger { color: var(--fg-danger); }
.text-warning { color: var(--fg-warning); }
.text-sm { font-size: 12px; }
.text-xs { font-size: 11px; }
.text-lg { font-size: 16px; }
.font-medium { font-weight: 500; }
.font-semibold { font-weight: 600; }
.mb-2 { margin-bottom: 8px; }
.mb-3 { margin-bottom: 12px; }
.mb-4 { margin-bottom: 16px; }
.mb-6 { margin-bottom: 24px; }
.mt-2 { margin-top: 8px; }
.mt-4 { margin-top: 16px; }
.p-3 { padding: 12px; }
.p-4 { padding: 16px; }
.hidden { display: none !important; }

/* INTRO BANNER */
.intro-banner {
  background: var(--accent-primary-subtle);
  border: 1px solid var(--accent-primary);
  border-radius: var(--radius-md);
  padding: 12px 16px;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--accent-primary);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}

/* SCROLLBARS */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-emphasis); border-radius: var(--radius-full); border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: var(--fg-tertiary); border: 2px solid transparent; background-clip: padding-box; }
</style>
</head>
<body>
<div id="app" class="app">
  <!-- TOPBAR -->

<script>
/* =========================================================================
   STATE MANAGEMENT (localStorage-backed)
   ========================================================================= */
const DEFAULT_STATE = {
  workspace: { id: 'acme', name: 'Acme Corporation', database: 'postgres' },
  theme: 'light',
  navCollapsed: false,
  currentProject: 'crm-001',
  projects: [
    {
      id: 'crm-001',
      name: 'Internal Sales CRM',
      description: 'Customer relationship management for the sales team',
      status: 'active',
      created: '2026-04-15',
      stage: 'ui-gen', // current stage
      stages: {
        intent: { status: 'approved', cost: 0.34 },
        prd: { status: 'approved', cost: 2.10 },
        'design-tokens': { status: 'approved', cost: 0.85 },
        'schema-synthesis': { status: 'approved', cost: 1.20 },
        'ui-gen': { status: 'in_review', cost: 18.50 },
        'code-gen': { status: 'pending', cost: 0 },
        'test-gen': { status: 'pending', cost: 0 },
        deployment: { status: 'pending', cost: 0 },
        maintenance: { status: 'pending', cost: 0 }
      }
    },
    {
      id: 'blog-001',
      name: 'Marketing Blog',
      description: 'Content publishing platform for marketing team',
      status: 'live',
      created: '2026-02-08',
      stage: 'maintenance',
      stages: {
        intent: { status: 'approved' },
        prd: { status: 'approved' },
        'design-tokens': { status: 'approved' },
        'schema-synthesis': { status: 'approved' },
        'ui-gen': { status: 'approved' },
        'code-gen': { status: 'approved' },
        'test-gen': { status: 'approved' },
        deployment: { status: 'approved' },
        maintenance: { status: 'active' }
      }
    }
  ],
  // Intent capture state
  intentBrief: {
    title: 'Internal Sales CRM',
    fields: {
      goals: 'confident',
      target_users: 'confident',
      success_criteria: 'confident',
      constraints: 'tentative',
      in_scope: 'confident',
      out_of_scope: 'tentative',
      assumptions: 'tentative',
      risks: 'empty',
      references: 'empty',
      estimated_scope: 'confident'
    }
  }
};

let state = loadState();

function loadState() {
  try {
    const stored = localStorage.getItem('platform-prototype-state');
    if (stored) return { ...DEFAULT_STATE, ...JSON.parse(stored) };
  } catch (e) { console.warn('localStorage read failed', e); }
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}

function saveState() {
  try {
    localStorage.setItem('platform-prototype-state', JSON.stringify(state));
  } catch (e) { console.warn('localStorage save failed', e); }
}

function resetState() {
  localStorage.removeItem('platform-prototype-state');
  state = JSON.parse(JSON.stringify(DEFAULT_STATE));
  navigate(currentRoute);
  toast('State reset to defaults', 'info');
}

/* =========================================================================
   ROUTING
   ========================================================================= */
let currentRoute = 'home';

function navigate(route) {
  currentRoute = route;
  document.querySelectorAll('.sidenav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.route === route);
  });
  updateBreadcrumbs(route);
  renderRoute(route);
  closeCmdk();
}

function updateBreadcrumbs(route) {
  const labels = {
    home: ['Home'],
    projects: ['Projects'],
    intent: ['Projects', state.projects.find(p=>p.id===state.currentProject)?.name || 'Project', 'Intent Capture'],
    prd: ['Projects', state.projects.find(p=>p.id===state.currentProject)?.name || 'Project', 'PRD'],
    'design-tokens': ['Projects', state.projects.find(p=>p.id===state.currentProject)?.name || 'Project', 'Design Tokens'],
    'schema-synthesis': ['Projects', state.projects.find(p=>p.id===state.currentProject)?.name || 'Project', 'Schema Synthesis'],
    'ui-gen': ['Projects', state.projects.find(p=>p.id===state.currentProject)?.name || 'Project', 'UI Generation'],
    'code-gen': ['Projects', state.projects.find(p=>p.id===state.currentProject)?.name || 'Project', 'Code Generation'],
    'test-gen': ['Projects', state.projects.find(p=>p.id===state.currentProject)?.name || 'Project', 'Tests'],
    deployment: ['Projects', state.projects.find(p=>p.id===state.currentProject)?.name || 'Project', 'Deployment'],
    maintenance: ['Projects', state.projects.find(p=>p.id===state.currentProject)?.name || 'Project', 'Maintenance'],
    schema: ['Data Plane', 'Schema Designer'],
    data: ['Data Plane', 'Data Browser'],
    storage: ['Data Plane', 'Storage'],
    query: ['Data Plane', 'Query Console'],
    auth: ['Auth & Members'],
    audit: ['Audit Log'],
    settings: ['Settings']
  };
  const trail = labels[route] || [route];
  const html = trail.map((label, i) => {
    if (i === trail.length - 1) return `<span class="current">${label}</span>`;
    return `<span>${label}</span><span class="sep">›</span>`;
  }).join('');
  document.getElementById('breadcrumbs').innerHTML = html;
}

function renderRoute(route) {
  const main = document.getElementById('main-content');
  const renderer = renderers[route] || renderers.home;
  main.innerHTML = renderer();
  // Re-attach any post-render handlers
  if (postRender[route]) postRender[route]();
}

/* =========================================================================
   THEME / NAV
   ========================================================================= */
function toggleTheme() {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', state.theme);
  saveState();
}
function toggleSideNav() {
  state.navCollapsed = !state.navCollapsed;
  document.getElementById('app').classList.toggle('nav-collapsed', state.navCollapsed);
  document.getElementById('collapse-icon').textContent = state.navCollapsed ? '›' : '‹';
  saveState();
}

/* =========================================================================
   TOAST / MODAL
   ========================================================================= */
function toast(msg, type='info', title=null) {
  const container = document.getElementById('toasts');
  const div = document.createElement('div');
  div.className = `toast ${type}`;
  div.innerHTML = `
    <div class="toast-content">
      ${title ? `<div class="toast-title">${title}</div>` : ''}
      <div class="toast-msg">${msg}</div>
    </div>
  `;
  container.appendChild(div);
  setTimeout(() => { div.style.animation = 'slideInRight 200ms reverse'; setTimeout(() => div.remove(), 200); }, 3500);
}

function showModal(title, body, footer) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

function openCmdk() {
  document.getElementById('cmdk').classList.remove('hidden');
  document.getElementById('cmdk-input').value = '';
  document.getElementById('cmdk-input').focus();
  filterCmdk('');
}
function closeCmdk() { document.getElementById('cmdk').classList.add('hidden'); }
function filterCmdk(q) {
  q = q.toLowerCase();
  const filtered = cmdkItems.filter(i => i.label.toLowerCase().includes(q));
  const grouped = {};
  filtered.forEach(i => { (grouped[i.group] = grouped[i.group] || []).push(i); });
  const html = Object.entries(grouped).map(([g, items]) => `
    <div class="cmdk-group-heading">${g}</div>
    ${items.map(i => `<div class="cmdk-item" onclick="${i.route ? `navigate('${i.route}')` : `(${i.action.toString()})()`}">${i.label}</div>`).join('')}
  `).join('');
  document.getElementById('cmdk-results').innerHTML = html || '<div style="padding: 16px; color: var(--fg-tertiary); font-size: 13px;">No results</div>';
}

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    openCmdk();
  }
  if (e.key === 'Escape') closeCmdk();
});

/* =========================================================================
   STAGE STATUS BADGES
   ========================================================================= */
function statusBadge(status) {
  const map = {
    pending: { cls: 'badge-default', label: 'Pending' },
    in_progress: { cls: 'badge-info', label: 'In Progress' },
    in_review: { cls: 'badge-warning', label: 'In Review' },
    approved: { cls: 'badge-success', label: 'Approved' },
    active: { cls: 'badge-info', label: 'Live' },
    failed: { cls: 'badge-danger', label: 'Failed' },
  };
  const s = map[status] || map.pending;
  return `<span class="badge ${s.cls}">${s.label}</span>`;
}

/* =========================================================================
   PIPELINE STEPPER
   ========================================================================= */
function pipelineStepper(activeStage) {
  const stages = [
    { key: 'intent', label: 'Intent' },
    { key: 'prd', label: 'PRD' },
    { key: 'design-tokens', label: 'Tokens' },
    { key: 'schema-synthesis', label: 'Schema' },
    { key: 'ui-gen', label: 'UI' },
    { key: 'code-gen', label: 'Code' },
    { key: 'test-gen', label: 'Tests' },
    { key: 'deployment', label: 'Deploy' },
    { key: 'maintenance', label: 'Maintain' },
  ];
  const proj = state.projects.find(p => p.id === state.currentProject);
  return `<div class="pipeline-stepper">${stages.map((s, i) => {
    const ss = proj?.stages?.[s.key];
    const isComplete = ss?.status === 'approved' || ss?.status === 'active';
    const isActive = s.key === activeStage;
    return `
      ${i > 0 ? '<span class="arrow">›</span>' : ''}
      <div class="pipeline-step ${isActive?'active':''} ${isComplete?'complete':''}" onclick="navigate('${s.key}')">
        <span class="dot"></span>
        <span>${s.label}</span>
      </div>`;
  }).join('')}</div>`;
}

interface Input {
  dealId: string;
  newStage: 'lead' | 'qualified' | 'proposal' | 'negotiation' | 'won' | 'lost';
}

interface Output {
  success: boolean;
  dealId: string;
  previousStage: string;
}

export async function updateDealStage(
  input: Input,
  ctx: FunctionContext,
): Promise&lt;Output&gt; {
  const { sdk, logger } = ctx;
  
  const deal = await sdk.data('deals')
    .where({ id: { _eq: input.dealId } })
    .one();
  
  if (!deal) {
    throw new NotFoundError(\`Deal \${input.dealId} not found\`);
  }
  
  const previousStage = deal.stage;
  
  await sdk.data('deals')
    .where({ id: { _eq: input.dealId } })
    .update({ stage: input.newStage });
  
  // Trigger downstream effects
  if (input.newStage === 'won' && previousStage !== 'won') {
    await sdk.functions.onDealWon({ dealId: input.dealId });
  }
  
  logger.info('Deal stage updated', {
    dealId: input.dealId,
    from: previousStage,
    to: input.newStage,
  });
  
  return {
    success: true,
    dealId: input.dealId,
    previousStage,
  };
}</div>
